name: Release

# Triggered when a GitHub Release is published. The release tag (vX.Y.Z) becomes the package version
# via hatch-vcs. Pre-release tags (v1.0.0-rc1) publish to PyPI + ghcr but do NOT update `latest`.
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  test:
    name: Test (ubuntu-latest, py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ matrix.python-version }}

      - name: OpenAPI build + validation
        run: uv run poe build

      - name: Run tests
        run: uv run poe test

  test-smoke:
    name: Test (${{ matrix.os }}, py3.12)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
      fail-fast: false
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-python-env
        with:
          python-version: "3.12"

      - name: Run tests
        run: uv run poe test

  wheel-build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-python-env

      - name: Build
        run: uv build

      - name: Verify version matches release tag
        run: |
          # hatch-vcs strips the leading `v` from tags, so `v0.1.0` → `0.1.0`
          expected="${GITHUB_REF_NAME#v}"
          actual=$(ls dist/iscc_search-*.whl | sed -E 's|dist/iscc_search-([^-]+)-.*|\1|' | head -1)
          if [ "$expected" != "$actual" ]; then
            echo "::error::Wheel version ($actual) does not match release tag ($expected)"
            exit 1
          fi
          echo "Version verified: $actual"

      - uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist/
          retention-days: 30

  wheel-smoke:
    name: Smoke-test wheel (${{ matrix.os }})
    needs: wheel-build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist

      - name: Install and verify
        run: |
          python -m venv .smoke-venv
          # Cross-platform venv bin dir:
          if [ -d ".smoke-venv/Scripts" ]; then
            BIN=.smoke-venv/Scripts
          else
            BIN=.smoke-venv/bin
          fi
          "$BIN/python" -m pip install --upgrade pip
          "$BIN/python" -m pip install dist/*.whl
          "$BIN/python" -c "import iscc_search; print('version:', iscc_search.__version__)"
          "$BIN/iscc-search" --help

  publish-pypi:
    name: Publish to PyPI
    needs: [test, test-smoke, wheel-smoke]
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "0.6.14"

      - name: Publish
        run: uv publish dist/*
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}

  publish-docker:
    name: Publish Docker image
    needs: [test, test-smoke, wheel-smoke]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          # `latest=auto` attaches `latest` only to the highest non-prerelease tag.
          flavor: |
            latest=auto
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-docs:
    name: Deploy documentation
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write  # zensical gh-deploy pushes to gh-pages
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-python-env

      - name: Build docs
        run: |
          uv run zensical build
          uv run python scripts/gen_llms_full.py

      - name: Deploy to gh-pages
        run: uv run zensical gh-deploy --force
